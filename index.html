<!DOCTYPE html>
<html>
<head>
    <title>Health Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            background: rgba(0,0,0,0.2);
        }

        .nav {
            text-align: center;
            margin: 10px;
        }

        .nav a {
            text-decoration: none;
            color: white;
            margin: 0 10px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        .nav a:hover {
            background: white;
            color: black;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            width: 180px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .charts {
            width: 90%;
            margin: auto;
            margin-top: 30px;
        }

        .chart-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            height: 400px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<div class="header">
    🏥 Real-Time Health Monitoring Dashboard
</div>

<div class="nav">
    <a href="/analytics">📊 Analytics</a>
    <a href="/report">📄 Report</a>
</div>

<div class="cards">
    <div class="card">
        ❤️ Heart Rate
        <div class="value" id="heart">--</div>
    </div>

    <div class="card">
        🚶 Steps
        <div class="value" id="steps">--</div>
    </div>

    <div class="card">
        🔥 Calories
        <div class="value" id="calories">--</div>
    </div>
</div>

<div class="charts">

    <div class="chart-box">
        <canvas id="heartChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="stepsChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="caloriesChart"></canvas>
    </div>

</div>

<script>
let labels = [];
let heartData = [];
let stepsData = [];

let heartChart = new Chart(document.getElementById("heartChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Heart Rate",
            data: heartData,
            borderColor: "red",
            backgroundColor: "rgba(255,0,0,0.2)",
            fill: true
        }]
    },
    options: { maintainAspectRatio: false }
});

let stepsChart = new Chart(document.getElementById("stepsChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Steps",
            data: stepsData,
            backgroundColor: "blue"
        }]
    },
    options: { maintainAspectRatio: false }
});

let caloriesChart = new Chart(document.getElementById("caloriesChart"), {
    type: "doughnut",
    data: {
        labels: ["Calories Burned"],
        datasets: [{
            data: [0],
            backgroundColor: ["orange"]
        }]
    },
    options: { maintainAspectRatio: false }
});

async function fetchData() {
    const res = await fetch("/data");
    const data = await res.json();

    document.getElementById("heart").innerText = data.heart_rate;
    document.getElementById("steps").innerText = data.steps;
    document.getElementById("calories").innerText = data.calories;

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    heartData.push(data.heart_rate);
    stepsData.push(data.steps);

    if (labels.length > 10) {
        labels.shift();
        heartData.shift();
        stepsData.shift();
    }

    caloriesChart.data.datasets[0].data = [data.calories];

    heartChart.update();
    stepsChart.update();
    caloriesChart.update();
}

setInterval(fetchData, 3000);
</script>

</body>
</html>
