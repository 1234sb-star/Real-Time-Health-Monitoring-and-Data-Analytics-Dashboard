<!DOCTYPE html>
<html>
<head>
    <title>Health Report</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            text-align: center;
            margin: 0;
        }

        h1 {
            padding: 20px;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 200px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 18px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            color: black;
            font-weight: bold;
        }

        a:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

<h1>📄 Health Report</h1>

<a href="/">🏠 Back to Dashboard</a>

<div class="container">
    <div class="card">
        Average Heart Rate
        <div class="value" id="avg">--</div>
    </div>

    <div class="card">
        Max Heart Rate
        <div class="value" id="max">--</div>
    </div>

    <div class="card">
        Min Heart Rate
        <div class="value" id="min">--</div>
    </div>
</div>

<script>
let dataArr = [];

async function fetchData() {
    let res = await fetch("/data");
    let d = await res.json();

    dataArr.push(d.heart_rate);

    let avg = dataArr.reduce((a,b)=>a+b,0)/dataArr.length;

    document.getElementById("avg").innerText = avg.toFixed(2);
    document.getElementById("max").innerText = Math.max(...dataArr);
    document.getElementById("min").innerText = Math.min(...dataArr);
}

setInterval(fetchData, 3000);
</script>

</body>
</html>
